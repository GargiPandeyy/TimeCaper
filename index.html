<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Time-Caper Chronicle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="parallax-bg-back"></div>
    <div id="parallax-bg-mid"></div>
    <div id="parallax-bg-front"></div>

    <div id="scanner" style="display: none;">
        <div class="scanner-ring"></div>
        <div class="scanner-crosshair-v"></div>
        <div class="scanner-crosshair-h"></div>
        <div id="scanner-readout">Dist: 999m</div>
    </div>

    <div id="animation-container"></div>

    <div id="flying-clocks-container"></div>

    <div id="matrix-container"></div>

    <div id="story-screen" class="screen active">
        <div class="story-content terminal-effect">
            <div class="tva-logo">
                <div class="logo-text-top">TIME VARIANCE</div>
                <div class="logo-text-mid">SOCIETY</div>
                <div class="logo-text-bottom">- HQ -</div>
            </div>
            <h1>[Signal Incoming]</h1>
            <p id="story-text-1" class="story-text-container"></p>
            <button id="start-btn" class="btn" style="display: none;">Access Time Hub</button>
        </div>
    </div>

    <div id="main-app" class="screen">
        <header>
            <nav>
                <button id="nav-hub" class="btn btn-nav active">Time Hub</button>
                <button id="nav-trophy" class="btn btn-nav">Trophy Room</button>
                <button id="muteBtn" class="btn btn-nav">🔊 Sound</button>
            </nav>
        </header>
        
        <div id="companion" class="companion terminal-effect">
            <div class="companion-avatar" id="companionAvatar">🤖</div>
            <div class="companion-bubble" id="companionBubble">Welcome, Agent. Select a mission from the Time Hub.</div>
        </div>
        
        <main>
            <div id="main-hub" class="app-mode active">
                <h2>Time Hub - Anomaly Hotspots</h2>
                <div class="terminal-wrapper terminal-effect">
                    <div id="mission-grid">
                    </div>
                </div>
            </div>
            
            <div id="mission-screen" class="app-mode">
                <h2 id="mission-title">Mission: Ancient Egypt</h2>
                <div id="scene-viewer" class="terminal-effect">
                </div>
                <p class="scan-instructions">Activate your scanner and find the anachronism!</p>
            </div>
            
            <div id="quiz-mode" class="app-mode">
                <div id="quizContainer" class="quiz-container terminal-effect">
                    <div class="quiz-header">
                        <h2 class="quiz-title-text">TIMELINE LOCK</h2>
                        <p class="score">Security Layers: <span id="quizScore">0</span> / <span id="quizTotal">0</span></p>
                    </div>
                    <div id="quiz-question">
                        <p class="question-text" id="questionText">Loading query...</p>
                        <div class="quiz-options" id="quizOptions"></div>
                    </div>
                    <div class="quiz-nav">
                        <button id="next-question" class="btn" style="display: none;">Next Layer →</button>
                    </div>
                </div>
            </div>
            
            <div id="trophy-room" class="app-mode">
                <h2>Collected Anachronisms</h2>
                <div class="terminal-wrapper terminal-effect">
                    <div id="trophy-grid">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
